openapi: 3.0.0
info:
  title: BehaviourAI API
  version: 2.0.0
  description: ML-powered customer segmentation API
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/stats:
    get:
      summary: Get system statistics
      responses:
        '200':
          description: OK
  /api/predict:
    post:
      summary: Predict segment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clicks: {type: integer}
                time_spent: {type: integer}
                purchase_count: {type: integer}
                page_views: {type: integer}
                cart_additions: {type: integer}
      responses:
        '200':
          description: OK with segment info
